<svg xmlns="http://www.w3.org/2000/svg" width="780" height="670" viewBox="0 0 780 670" font-family="'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'DejaVu Sans Mono',monospace" font-size="13">
  <style>
    text { fill: #cdd6f4; }
