  <circle cx="44" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="66" cy="20" r="6" fill="#a6e3a1"/>
  <text x="390" y="25" text-anchor="middle" fill="#9399b2" font-size="12">gestore-spese</text>

  <!-- sessione -->
  <text x="20" y="64"><tspan class="grn">$ </tspan>gestore-spese</text>
