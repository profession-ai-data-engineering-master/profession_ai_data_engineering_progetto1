  <text x="20" y="164">[3] Mostra Top 10 delle Spese</text>
  <text x="20" y="184">[esci] Esci dal programma</text>
  <text x="20" y="204"><tspan class="grn">&gt; </tspan>1</text>
  <text x="20" y="224">Inserisci la data della nuova spesa (dd/mm/yyyy): 18/06/2023</text>
  <text x="20" y="244">Inserisci la descrizione della nuova spesa: rata mutuo</text>
  <text x="20" y="264">Inserisci l'importo della nuova spesa: 1231</text>
  <text x="20" y="284">Aggiunta con successo nuova Spesa: Data: 18/06/2023, Descrizione: 'rata mutuo', Importo: 1231.0</text>
  <text x="20" y="324">Scegli un'opzione (inserisci la chiave):</text>
  <text x="20" y="344">[1] Aggiungi una Spesa</text>
