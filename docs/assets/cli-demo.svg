  <text x="20" y="464">Data: 2023-06, Importo: 1231.0</text>
  <text x="20" y="504">Scegli un'opzione (inserisci la chiave):</text>
  <text x="20" y="524">[1] Aggiungi una Spesa</text>
  <text x="20" y="544">[2] Mostra Report Mensile</text>
  <text x="20" y="564">[3] Mostra Top 10 delle Spese</text>
  <text x="20" y="584">[esci] Esci dal programma</text>
