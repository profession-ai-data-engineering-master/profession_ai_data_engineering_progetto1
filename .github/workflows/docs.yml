name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari al deploy su GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta; non annullare quelli in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentazione (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build HTML (warning come errori)
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy su GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
